apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/confighub/cubbychat/backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              value: postgres://admin:password@postgres:5432/chatdb
            - name: OLLAMA_ENABLED
              value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
